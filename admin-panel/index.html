<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Sumber Sentuhan Emas</title>
  <meta name="description" content="Admin panel login for Sumber Sentuhan Emas real estate management.">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-icon">
        <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
        </svg>
      </div>
      <h1>Admin Panel</h1>
      <p class="subtitle">Sumber Sentuhan Emas — Sign in to manage your content</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
            <input type="email" id="email" name="email" placeholder="admin@example.com" autocomplete="email" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"
              stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password"
              required>
            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">
              <svg id="eye-open" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              <svg id="eye-closed" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="1.5" style="display:none">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            </button>
          </div>
        </div>

        <div class="error-msg" id="error-msg" role="alert"></div>

        <button type="submit" class="btn-primary" id="login-btn">
          <span class="btn-text">Sign In</span>
          <div class="spinner"></div>
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import { loginWithEmail } from './js/auth.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
    import { auth } from './js/firebase-config.js';

    // If already logged in, skip to dashboard
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'dashboard.html';
    });

    const form = document.getElementById('login-form');
    const btn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');
    const togglePw = document.getElementById('toggle-pw');
    const eyeOpen = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');

    togglePw.addEventListener('click', () => {
      const pw = document.getElementById('password');
      const isText = pw.type === 'text';
      pw.type = isText ? 'password' : 'text';
      eyeOpen.style.display = isText ? '' : 'none';
      eyeClosed.style.display = isText ? 'none' : '';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      btn.disabled = true;
      btn.classList.add('loading');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        await loginWithEmail(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        let msg = 'Invalid email or password.';
        if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
        else if (err.code === 'auth/wrong-password') msg = 'Incorrect password.';
        else if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Please try again later.';
        else if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your connection.';
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    });
  </script>
</body>

</html>
